# Competitor Channels — Seed list for competitor_agent weekly analysis
#
# Used by agents/competitor_agent.py weekly_intel() to track what's
# working in the Hinglish tech/explainer niche.
#
# Format:
#   channel_id: YouTube channel ID
#   channel_name: Human-readable name
#   category: Content category for grouping
#
# To find channel IDs:
#   1. Go to the channel page
#   2. View page source, search for "channelId"
#   OR use: https://www.youtube.com/channel/<CHANNEL_ID>

seed_channels:
  - channel_name: "Be A Engineer"
    channel_id: ""           # TODO: Fill in channel ID
    category: "hindi_tech"

