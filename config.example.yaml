# YouTube Kids Video Automation Configuration
# Copy this file to config.yaml and fill in your API keys

openai:
  api_key: "YOUR_OPENAI_API_KEY"
  model: "gpt-4o-mini"

# Image generation - choose one provider
image_provider: "replicate"  # options: "replicate", "openai", "huggingface", "pexels"

replicate:
  api_token: "YOUR_REPLICATE_API_TOKEN"
  model: "black-forest-labs/flux-schnell"

huggingface:
  api_token: "YOUR_HF_API_TOKEN"
  model: "stabilityai/stable-diffusion-xl-base-1.0"

pexels:
  api_key: "YOUR_PEXELS_API_KEY"

# TTS configuration
# Best for Hinglish kids content:
#   "google"     — Neural2/WaveNet en-IN, full SSML, uses GCP credits (recommended)
#   "elevenlabs" — native Hindi+English code-switching, multilingual model
#   "sarvam"     — purpose-built Indian AI, most authentic Hinglish, free ₹1000 trial
#   "openai"     — very human-sounding (tts-1-hd), no Indian accent
#   "edge-tts"   — free, no API key, but robotic + mispronounces Hindi words
tts:
  provider: "google"
  # Google Cloud TTS — uses GCP credits ($300 free tier on new accounts)
  # Setup:
  #   1. Enable "Cloud Text-to-Speech API" in your GCP project
  #   2. Create a service account (IAM → Service Accounts → Create → Role: Cloud Text-to-Speech User)
  #   3. Download JSON key → set path below
  google_tts_credentials: ""               # e.g. "/home/ec2-user/gcp-key.json"
  google_tts_voice_story: "en-IN-Neural2-D"    # warm female Indian English — stories & videos
  google_tts_voice_lullaby: "en-IN-Neural2-D"  # same voice, slower rate + lower pitch at runtime
  google_tts_voice_poem: "en-IN-Neural2-A"     # clear female — rhythmic rhyme delivery
  # Premium (higher GCP cost, ultra-realistic Chirp3 HD):
  # google_tts_voice_story: "en-IN-Chirp-HD-F"
  # google_tts_voice_poem: "en-IN-Chirp-HD-O"
  # --- ElevenLabs (alternative) ---
  openai_voice: "nova"
  # elevenlabs_api_key: "YOUR_ELEVENLABS_API_KEY"
  # elevenlabs_model: "eleven_multilingual_v2"
  # elevenlabs_voice_id: "9BWtsMINqrJLrRacOk9x"  # Aria — free pre-made voice
  # --- ElevenLabs Voice Clone (requires Starter plan $5/mo) ---
  # To use a cloned voice: create one at https://elevenlabs.io/voice-cloning
  # then set the clone ID and enable it below. Disabled by default.
  # elevenlabs_use_clone: false
  # elevenlabs_voice_clone_id: "YOUR_CLONED_VOICE_ID"
  # --- Sarvam AI Bulbul v3 (best for Hinglish, ~₹178/month for 3 shorts/day) ---
  # sarvam_api_key: "YOUR_SARVAM_API_KEY"
  # sarvam_speaker: "priya"  # female: priya, neha, pooja, kavya, shreya | male: shubh, rahul, amit

# Language configuration — Hinglish only (Indian accent voices)
languages:
  - code: "hi"
    name: "Hindi"
    voices:
      - "en-IN-NeerjaNeural"            # Indian English female — warm, natural Hinglish
      - "en-IN-NeerjaExpressiveNeural"  # Indian English female — expressive, kids-friendly
      # hi-IN-SwaraNeural removed: native Hindi TTS reads English with heavy accent (bad for Hinglish)

# YouTube configuration
youtube:
  client_secrets_file: "client_secrets.json"
  token_file: "token.json"
  category_id: "24"  # Entertainment
  privacy_status: "public"  # public, private, unlisted
  made_for_kids: true

# Instagram configuration (uses official Meta/Instagram Graph API)
# See: https://developers.facebook.com/docs/instagram-platform/instagram-graph-api/content-publishing
instagram:
  enabled: false
  ig_user_id: "YOUR_INSTAGRAM_BUSINESS_ACCOUNT_ID"
  access_token: "YOUR_LONG_LIVED_ACCESS_TOKEN"
  graph_api_version: "v21.0"

# Content configuration
content:
  niche: "fun educational facts for kids"
  target_age: "3-8"
  video_duration_minutes: 3
  scenes_per_video: 6
  image_style: "soft watercolor illustration, smooth edges, pastel colors, gentle dreamy look, kid-friendly, no sharp lines, no text, no words"
  # Character consistency — same character appears in every scene image of a video
  # Options: "teddy_bear_friend", "bunny_dreamer", "owl_storyteller", "random", or "" to disable
  use_characters: true
  character: "teddy_bear_friend"

# Scheduler + upload time optimization
schedule:
  videos_per_week: 14
  upload_days: ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"]
  upload_time: "21:00"  # 9 PM — ensure server timezone is set to Asia/Kolkata (IST)
  optimize_time: true               # auto-adjust upload time based on performance data
  time_slots_to_test: [15, 18, 20, 21]  # hours (IST) to rotate through for testing
  min_data_for_optimization: 20     # minimum uploads before auto-optimizing

# Video settings
video:
  resolution: [1280, 720]
  fps: 24
  bg_music_volume: 0.08
  subtitle_font_size: 48
  subtitle_color: "yellow"

# Brand voice (optional - keeps consistent personality across videos)
brand_voice:
  enabled: false
  tone: "warm, enthusiastic, educational storyteller for kids"
  catchphrases: ["Hey amazing kids!", "Wasn't that super cool?"]
  vocabulary_level: "simple"

# A/B testing (optional - test different titles/hooks/thumbnails)
ab_testing:
  enabled: false
  variants_count: 3
  min_data_points: 10

# Analytics feedback loop — learns from past video performance to optimize future content
analytics:
  enabled: true
  youtube_analytics: true
  fetch_delay_hours: 48
  detailed_metrics: true          # use YouTube Analytics API for CTR/impressions (requires re-auth)
  category_weight_min_videos: 5   # min videos per category before weighting kicks in

# Playlist automation (optional - auto-organize videos into playlists)
playlists:
  enabled: false
  auto_create: true
  min_videos_for_playlist: 3
  naming_template: "{category} for Kids - {language}"

# Animation settings (for --video and --shorts pipeline)
animation:
  provider: "kenburns"  # options: "kenburns" (free), "ai" (uses Replicate ~$0.20/scene)
  image_style: "soft cartoon illustration, smooth gentle colors, dreamy pastel tones, kid-friendly, soft edges, Pixar-like warmth, no text, no words"
  kenburns:
    zoom_ratio: 0.04        # how much to zoom per second
    effects: ["zoom_in", "zoom_out", "pan_left", "pan_right", "pan_up", "combined"]
  ai:
    model: "wan-video/wan-2.5-i2v-fast"  # Replicate model for image-to-video
    duration: 5              # seconds per generated clip
    resolution: "720p"

# AI background music — generated via Replicate musicgen (or use local files)
bg_music:
  provider: "local"       # options: "replicate" (AI per run), "local" (pre-generated, data/music/)
  replicate_model: "meta/musicgen"
  prompt: "gentle playful kids background music, soft happy melody, educational, warm, no lyrics, loopable"
  duration: 30            # seconds — auto-looped to fit video length

# Email notifications — sent after each pipeline run with video links
notifications:
  email:
    enabled: false                        # set to true once you configure the fields below
    sender_email: "YOUR_GMAIL@gmail.com"
    sender_password: "YOUR_GMAIL_APP_PASSWORD"  # 16-char App Password from Google Account settings
    recipient_email: "YOUR_EMAIL@gmail.com"

# Voice rotation — use a different Google TTS voice per video ($0 extra cost)
# Each video gets a random narrator voice from the pool, making the channel
# sound less robotic/repetitive to YouTube's AI content detection.
voice_rotation:
  enabled: true
  google_voice_pool:
    - "en-IN-Neural2-A"   # clear female — good for educational
    - "en-IN-Neural2-D"   # warm female — good for stories
    - "en-IN-Wavenet-A"   # clear female wavenet — gentle delivery
    - "en-IN-Wavenet-D"   # warm female wavenet — engaging tone

# Format variation — randomize visual parameters per video ($0 extra cost)
# Prevents YouTube from detecting "same template" pattern across uploads.
# Each video gets different subtitle styles, transition durations, and
# Ken Burns zoom ratios. Enabled by default.
format_variation:
  enabled: true

# --- v2: Growth Intelligence Modules ---

# Trend Intelligence — discovers trending kids educational topics
# Sources: YouTube trending search, YouTube autocomplete, competitor channel analysis
trends:
  enabled: true
  refresh_interval_hours: 24        # how often to refresh trend data
  competitor_channels: []           # add YouTube channel IDs to track (e.g., "UCxxxxxxx")
  niche_keywords:                   # search queries for trend discovery
    - "kids fun facts"
    - "kids science experiments"
    - "children educational"
    - "bachche ke liye facts"
    - "amazing facts for kids"
  trend_weight_in_topic_gen: 0.4    # 40% chance of using a trend topic vs random

# Topic Clustering — groups topics into thematic clusters for topical authority
clusters:
  enabled: true
  min_cluster_size: 3
  max_clusters: 15
  refresh_interval_days: 7
  use_cluster_topics: true          # pick topics from clusters instead of random

# Series Generator — transforms clusters into episodic content series
# Kids audiences prefer repeated characters and formats
series:
  enabled: true
  max_active_series: 3              # max concurrent series
  episodes_per_series: 15           # episodes per series plan
  series_topic_priority: 0.6        # 60% chance of picking a series topic over standalone

# Thumbnail A/B Testing — generates multiple thumbnail variants per video
# Auto-replaces underperforming thumbnails based on CTR data
thumbnail_ab:
  enabled: true
  variants_count: 3                 # number of thumbnail variants to generate
  auto_replace: true                # automatically replace underperforming thumbnails
  min_hours_before_replace: 72      # wait 72h before evaluating
  min_impressions_before_replace: 100
  replace_if_ctr_below_pct: 0.8    # replace if CTR is below 80% of channel average

# Orchestration engine
orchestration:
  engine: "simple"  # options: "simple" (schedule lib), "prefect"
